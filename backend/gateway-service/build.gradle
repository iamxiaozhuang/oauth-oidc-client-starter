plugins {
    id 'org.springframework.boot' version '3.5.9'
    id 'application'
}

description = 'Spring Cloud Gateway BFF service that uses oauth-oidc-client-starter.'

dependencies {
    // Default to the included project for repository development. Set
    // -PusePublishedStarter=true after publishing/installing the starter artifact
    // when you want this demo Gateway to consume the package like an external app.
    if (providers.gradleProperty('usePublishedStarter').map { it.toBoolean() }.getOrElse(false)) {
        implementation "io.github.oidcclient:oauth-oidc-client-starter:${version}"
    } else {
        implementation project(':oauth-oidc-client-starter')
    }
    implementation "org.springframework.cloud:spring-cloud-starter-gateway-server-webflux:${springCloudGatewayVersion}"
    implementation "org.springframework.boot:spring-boot-starter-security:${springBootVersion}"
}

application {
    mainClass = 'io.github.oidcclient.gateway.GatewayServiceApplication'
}
