name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build and test
        working-directory: backend
        run: ./gradlew clean build --no-daemon

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          backend/oauth-oidc-client-starter/build/libs/oauth-oidc-client-starter-*.jar
          --title "OAuth2/OIDC Client Starter ${GITHUB_REF_NAME}"
          --generate-notes
